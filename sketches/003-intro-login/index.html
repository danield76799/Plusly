<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plusly — Intro</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
  }

  .phone-frame {
    width: 390px;
    height: 844px;
    background: #0A0A0F;
    border-radius: 40px;
    overflow: hidden;
    box-shadow: 0 25px 80px rgba(0,0,0,0.5), 0 0 0 2px #333;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .status-bar {
    height: 54px;
    background: #0A0A0F;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 30px 8px;
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    flex-shrink: 0;
  }

  .intro-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 32px;
    gap: 32px;
  }

  .logo-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .logo-icon {
    width: 120px;
    height: 120px;
    position: relative;
  }
  .logo-icon .circle-outer {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background: linear-gradient(135deg, #49AFC2, #3A8FA0);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 40px rgba(73, 175, 194, 0.3);
  }
  .logo-icon .circle-inner {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: #0A0A0F;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-icon .plus {
    font-size: 40px;
    font-weight: 300;
    color: #49AFC2;
    line-height: 1;
  }

  .logo-text {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }
  .logo-text h1 {
    font-size: 42px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -1px;
  }
  .logo-text p {
    font-size: 16px;
    color: #888;
    text-align: center;
    line-height: 1.5;
  }

  .features-grid {
    display: flex;
    flex-direction: column;
    gap: 16px;
    width: 100%;
    margin-top: 16px;
  }
  .feature-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: rgba(73, 175, 194, 0.06);
    border-radius: 16px;
    border: 1px solid rgba(73, 175, 194, 0.1);
  }
  .feature-icon {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .feature-icon svg { width: 22px; height: 22px; }
  .feature-icon.blue { background: rgba(73, 175, 194, 0.15); }
  .feature-icon.blue svg { fill: #49AFC2; }
  .feature-icon.green { background: rgba(76, 175, 80, 0.15); }
  .feature-icon.green svg { fill: #4CAF50; }
  .feature-icon.purple { background: rgba(156, 39, 176, 0.15); }
  .feature-icon.purple svg { fill: #9C27B0; }
  .feature-text .feature-title {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
  }
  .feature-text .feature-desc {
    font-size: 12px;
    color: #888;
    margin-top: 2px;
  }

  .button-section {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    padding: 0 32px 40px;
  }

  .btn {
    height: 52px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    gap: 10px;
  }
  .btn-primary {
    background: #49AFC2;
    color: #fff;
    box-shadow: 0 4px 20px rgba(73, 175, 194, 0.3);
  }
  .btn-primary:hover {
    background: #5BC0D3;
    transform: translateY(-1px);
    box-shadow: 0 6px 30px rgba(73, 175, 194, 0.4);
  }
  .btn-secondary {
    background: transparent;
    color: #49AFC2;
    border: 1.5px solid #49AFC2;
  }
  .btn-secondary:hover {
    background: rgba(73, 175, 194, 0.08);
  }
  .btn-ghost {
    background: transparent;
    color: #888;
    font-size: 14px;
    font-weight: 500;
  }
  .btn-ghost:hover { color: #aaa; }

  .btn svg { width: 20px; height: 20px; fill: currentColor; }

  .footer {
    text-align: center;
    padding: 0 32px 32px;
    font-size: 12px;
    color: #555;
  }
  .footer a { color: #49AFC2; text-decoration: none; }

  .glow {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(73, 175, 194, 0.08), transparent 70%);
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="glow"></div>

  <!-- Status Bar -->
  <div class="status-bar">
    <span>9:41</span>
    <div style="display:flex;gap:5px;align-items:center">
      <svg width="18" height="18" fill="#fff" viewBox="0 0 24 24"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      <svg width="18" height="18" fill="#fff" viewBox="0 0 24 24"><path d="M15.67 4H14V2h-4v2H8.33C7.6 4 7 4.6 7 5.33v15.33C7 21.4 7.6 22 8.33 22h7.33c.74 0 1.34-.6 1.34-1.33V5.33C17 4.6 16.4 4 15.67 4z"/></svg>
    </div>
  </div>

  <!-- Intro Content -->
  <div class="intro-content">
    <div class="logo-section">
      <div class="logo-icon">
        <div class="circle-outer">
          <div class="circle-inner">
            <span class="plus">+</span>
          </div>
        </div>
      </div>

      <div class="logo-text">
        <h1>Plusly</h1>
        <p>Secure communication via the<br>decentralized Matrix protocol</p>
      </div>
    </div>

    <div class="features-grid">
      <div class="feature-item">
        <div class="feature-icon blue">
          <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
        </div>
        <div class="feature-text">
          <div class="feature-title">End-to-end encrypted</div>
          <div class="feature-desc">All your messages are private and secure</div>
        </div>
      </div>

      <div class="feature-item">
        <div class="feature-icon green">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
        </div>
        <div class="feature-text">
          <div class="feature-title">Decentralized</div>
          <div class="feature-desc">Choose your own server, no lock-in</div>
        </div>
      </div>

      <div class="feature-item">
        <div class="feature-icon purple">
          <svg viewBox="0 0 24 24"><path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/></svg>
        </div>
        <div class="feature-text">
          <div class="feature-title">Free & open source</div>
          <div class="feature-desc">Built on open standards</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Buttons -->
  <div class="button-section">
    <button class="btn btn-primary">
      Create account
    </button>
    <button class="btn btn-secondary">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      Sign in with Matrix ID
    </button>
    <button class="btn btn-ghost">
      Already have an account? Sign in
    </button>
  </div>

  <div class="footer">
    By continuing you agree to our <a href="#">Terms</a>
  </div>
</div>

</body>
</html>
