name: Build Android App Bundle

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.29.0'
        channel: 'stable'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Accept Android licenses
      run: yes | flutter doctor --android-licenses || true
      
    - name: Get dependencies
      run: flutter pub get
      
    - name: Setup release signing
      run: |
        # Create key.properties for release signing
        echo "storePassword=plusly123" > android/key.properties
        echo "keyPassword=plusly123" >> android/key.properties
        echo "keyAlias=plusly" >> android/key.properties
        echo "storeFile=plusly-upload.keystore" >> android/key.properties
        
        # Copy the upload keystore
        cp android/app/plusly-upload.keystore android/app/
        
    - name: Build App Bundle
      run: flutter build appbundle --release
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
      
    - name: Upload AAB
      uses: actions/upload-artifact@v4
      with:
        name: release-aab
        path: build/app/outputs/bundle/release/app-release.aab
        
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        files: build/app/outputs/bundle/release/app-release.aab
        tag_name: playstore-v${{ github.run_number }}
        name: Play Store Release v${{ github.run_number }}
        body: |
          Play Store App Bundle (AAB) voor Plusly
          
          ## Upload naar Play Store
          1. Download `app-release.aab`
          2. Ga naar https://play.google.com/console
          3. Upload de AAB bij "App bundles"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
