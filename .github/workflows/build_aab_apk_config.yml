name: Build AAB (APK Config)

on:
  workflow_dispatch:

concurrency:
  group: aab_apk_config
  cancel-in-progress: true

jobs:
  build_android_aab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free up disk space
        run: |
          # Remove large unnecessary packages and files to prevent "No space left on device"
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          df -h

      - run: cat .github/workflows/versions.env >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Flutter
        run: |
          git clone --depth 1 https://github.com/flutter/flutter.git -b stable
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-deps-${{ runner.os }}-

      - name: Verify Flutter
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter --version

      - name: Clean Flutter build
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter clean

      - name: Generate localization
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter gen-l10n

      - name: Generate assets
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          dart run flutter_launcher_icons:main
          dart run flutter_native_splash:create

      - name: Build Android App Bundle (same as APK config)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter build appbundle --release --target-platform android-arm64,android-arm --dart-define=DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }} 2>&1 | tee build.log
          BUILD_EXIT_CODE=$?
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            grep -E "(error:|Error:|FAILURE|Exception:)" build.log | head -50
            exit $BUILD_EXIT_CODE
          fi
          mkdir -p output
          cp build/app/outputs/bundle/release/app-release.aab output/plusly-release.aab
          ls -la output/

      - name: Verify AAB signing
        run: |
          jarsigner -verify -verbose output/plusly-release.aab
          
      - name: Check AAB contents
        run: |
          # List the contents of the AAB to verify it has the right structure
          unzip -l output/plusly-release.aab | head -30

      - name: Sign AAB with release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/keystore.jks
          # Sign the AAB
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore /tmp/keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            output/plusly-release.aab "$KEY_ALIAS"
          # Verify signing
          jarsigner -verify output/plusly-release.aab
          # Check SHA1 fingerprint
          keytool -list -v -keystore /tmp/keystore.jks -storepass "$KEYSTORE_PASSWORD" | grep "SHA1"

      - name: Verify AAB structure
        run: |
          echo "=== AAB Contents ==="
          unzip -l output/plusly-release.aab | head -40
          echo ""
          echo "=== Checking for native libraries ==="
          unzip -l output/plusly-release.aab | grep -E "\.so$" | head -20

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aab-build-log
          path: build.log
          retention-days: 3

      - name: Upload AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: output/plusly-release.aab
          retention-days: 7
