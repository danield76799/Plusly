name: Main Deploy Workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main_deploy
  cancel-in-progress: false

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - run: cat .github/workflows/versions.env >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
          cache: 'gradle'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-deps-${{ runner.os }}-

      - name: Verify Flutter
        run: flutter --version

      - name: Clean Flutter build
        run: flutter clean

      - name: Generate localization
        run: flutter gen-l10n

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate assets
        run: |
          dart run flutter_launcher_icons:main
          dart run flutter_native_splash:create

      - name: Read version
        id: bump
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //' | tr -d ' ')
          VERSION_NAME=$(echo "$VERSION" | sed 's/+.*//')
          BUILD_NUMBER=$(echo "$VERSION" | sed 's/.*+//')
          
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "full_version=${VERSION_NAME}+${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          echo "Using version ${VERSION_NAME}+${BUILD_NUMBER}"

      # === SIGNING SETUP (optional — uses debug signing if secrets missing) ===
      - name: Setup signing
        id: signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ] && [ -n "$KEYSTORE_PASSWORD" ] && [ -n "$KEY_ALIAS" ] && [ -n "$KEY_PASSWORD" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/upload-keystore.jks
            cat > android/key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
            echo "has_signing=true" >> $GITHUB_OUTPUT
            echo "Signing configured"
          else
            echo "has_signing=false" >> $GITHUB_OUTPUT
            echo "WARNING: No signing secrets found — using debug signing"
          fi

      # === APK BUILD (universal APK — works on all devices) ===
      - name: Build Android APK (universal)
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          flutter build apk --release --dart-define=DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY || '' }}
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/plusly-universal-release.apk || true

      # === APK BUILD (split per architecture — smaller files) ===
      - name: Build Android APK (split ABIs)
        if: always()
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          flutter build apk --release --split-per-abi --dart-define=DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY || '' }}
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk output/plusly-armeabi-v7a-release.apk || true
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk output/plusly-arm64-v8a-release.apk || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk output/plusly-x86_64-release.apk || true

      # === AAB BUILD (Play Store) ===
      - name: Build Android App Bundle
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          flutter build appbundle --release --dart-define=DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY || '' }}
          cp build/app/outputs/bundle/release/app-release.aab output/plusly-release.aab || true

      # === VERIFY OUTPUTS ===
      - name: List build outputs
        run: |
          echo "=== Build outputs ==="
          ls -la output/ || echo "No output directory"
          echo "=== APK files ==="
          find build/app/outputs -name "*.apk" -type f || echo "No APK files found"

      # === UPLOAD ARTIFACTS (always — even if release fails) ===
      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: plusly-build-${{ steps.bump.outputs.full_version }}
          path: output/*
          retention-days: 30

      # === PLAY STORE DEPLOY (optional — only if key exists) ===
      - name: Setup Play Store key
        id: playstore
        env:
          PLAYSTORE_DEPLOY_KEY: ${{ secrets.PLAYSTORE_DEPLOY_KEY }}
        run: |
          if [ -n "$PLAYSTORE_DEPLOY_KEY" ]; then
            echo "$PLAYSTORE_DEPLOY_KEY" | base64 -d > android/keys.json
            echo "has_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_key=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Ruby & Fastlane
        if: steps.playstore.outputs.has_key == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Deploy to Play Store
        if: steps.playstore.outputs.has_key == 'true'
        working-directory: android
        run: bundle exec fastlane deploy_internal_test

      # === GITHUB RELEASE ===
      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version_name }}+${{ steps.bump.outputs.build_number }}
          name: Plusly v${{ steps.bump.outputs.version_name }}+${{ steps.bump.outputs.build_number }}
          files: output/*
          generate_release_notes: true
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # === NOTIFY ON FAILURE ===
      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Build failed! Check logs above for details."
          echo "Common causes:"
          echo "  - Missing signing secrets (KEYSTORE_BASE64, etc.)"
          echo "  - Flutter build errors"
          echo "  - Dependency conflicts"
