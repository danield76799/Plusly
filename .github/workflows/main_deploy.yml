name: Main Deploy Workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main_deploy
  cancel-in-progress: true

jobs:
  build_android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - run: cat .github/workflows/versions.env >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Flutter
        run: |
          git clone --depth 1 https://github.com/flutter/flutter.git -b stable
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-deps-${{ runner.os }}-

      - name: Verify Flutter
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter --version

      - name: Clean Flutter build
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter clean

      - name: Generate localization
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter gen-l10n

      - name: Generate assets
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter pub run flutter_launcher_icons:main
          flutter pub run flutter_native_splash:create

      # === SETUP RUBY & FASTLANE (needed for Play Store operations) ===
      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Install gems
        working-directory: android
        run: bundle install

      # === AAB BUILD + SIGNING ===
      - name: Setup Play Store signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAYSTORE_DEPLOY_KEY: ${{ secrets.PLAYSTORE_DEPLOY_KEY }}
        run: |
          cd android/app
          echo "$KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          cd ..
          cat > key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          # Only create keys.json if PLAYSTORE_DEPLOY_KEY is set
          if [ -n "$PLAYSTORE_DEPLOY_KEY" ]; then
            echo "$PLAYSTORE_DEPLOY_KEY" > keys.json
            echo "has_playstore_key=true" >> $GITHUB_OUTPUT
          else
            echo "has_playstore_key=false" >> $GITHUB_OUTPUT
          fi
          cd ..

      # === APK BUILD (after signing setup) ===
      - name: Build Signed Android APK
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          # Debug: Check if keystore exists
          ls -la android/app/upload-keystore.jks || echo "Keystore not found!"
          cat android/key.properties || echo "key.properties not found!"
          # Build APK
          flutter build apk --release --target-platform android-arm64,android-arm --dart-define=DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }}
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/plusly-release.apk
          ls -la output/

      - name: Get next build number from Play Store
        id: build_number
        working-directory: android
        run: |
          # Check if we have a Play Store key
          if [ -f keys.json ] && [ -s keys.json ]; then
            bundle exec fastlane run google_play_track_version_codes track:internal json_key:keys.json > /tmp/version_codes.txt
            LAST_VERSION=$(grep -o '[0-9]\+' /tmp/version_codes.txt | head -1)
            NEXT_VERSION=$((LAST_VERSION + 1))
            echo "last_version=$LAST_VERSION" >> $GITHUB_OUTPUT
            echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
            echo "Last Play Store version: $LAST_VERSION"
            echo "Next version: $NEXT_VERSION"
          else
            # Fallback: use current pubspec build number + 1
            CURRENT_BUILD=$(grep "^version:" ../pubspec.yaml | grep -o '+[0-9]\+' | tr -d '+')
            if [ -z "$CURRENT_BUILD" ]; then
              CURRENT_BUILD=0
            fi
            NEXT_VERSION=$((CURRENT_BUILD + 1))
            echo "last_version=$CURRENT_BUILD" >> $GITHUB_OUTPUT
            echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
            echo "No Play Store key found, using local build: $NEXT_VERSION"
          fi

      - name: Update pubspec version
        run: |
          NEXT_VERSION=${{ steps.build_number.outputs.next_version }}
          sed -i "s/^version: .*/version: 1.1.0+$NEXT_VERSION/" pubspec.yaml
          cat pubspec.yaml | grep "^version:"

      - name: Build Android App Bundle
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter build appbundle \
            --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --dart-define=DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }}
          cp build/app/outputs/bundle/release/app-release.aab output/plusly-release.aab

      # === UPLOAD ARTIFACTS ===
      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-build-log
          path: build.log
          retention-days: 3

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: output/plusly-release.apk
          retention-days: 7

      - name: Upload AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: output/plusly-release.aab
          retention-days: 7

      # === PLAY STORE DEPLOY ===
      - name: Deploy to Play Store
        run: bundle exec fastlane deploy_internal_test
        working-directory: android

      # === GITHUB RELEASE ===
      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "Full version: $VERSION"
          # Extract just the version without build suffix (e.g., "1.3.0" from "1.3.0+927")
          VERSION_NAME=$(echo "$VERSION" | sed 's/+.*//')
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "full_version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: Plusly v${{ steps.version.outputs.version_name }}
          files: |
            output/plusly-release.apk
            output/plusly-release.aab
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
