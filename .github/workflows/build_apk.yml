name: Build Android APK (Test Build)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.7'
        channel: 'stable'
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
    
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        tag_name: test-whatsapp-bridge-fix-${{ github.run_number }}
        name: Test Build - WhatsApp Bridge Fix #${{ github.run_number }}
        body: |
          ## Test Build - WhatsApp Bridge Detection Fix
          
          **Wijzigingen:**
          - WhatsApp bridge detectie patronen uitgebreid
          - Toegevoegd: `@whatsapp`, `@botwhatsapp`, `@bot.whatsapp`, `@whatsappbot`
          - `android_system_font` plugin tijdelijk uitgeschakeld (Kotlin daemon crash)
          
          **Let op:** Dit is een test build. Gebruik op eigen risico.
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
