name: Build Android APK (Test Build)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Flutter
      run: |
        git clone https://github.com/flutter/flutter.git -b stable --depth 1
        echo "$PWD/flutter/bin" >> $GITHUB_PATH
        flutter doctor
        flutter --version
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Clean Flutter build
      run: flutter clean
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Build APK
      run: flutter build apk --release --target-platform android-arm64,android-arm
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: build/app/outputs/flutter-apk/app-release.apk
    
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: build/app/outputs/flutter-apk/app-release.apk
        tag_name: v0.9.9-build${{ github.run_number }}
        name: Plusly v0.9.9 (Build #${{ github.run_number }})
        body: |
          ## Plusly v0.9.9
          
          **Belangrijke fixes:**
          - WhatsApp bridge detectie verbeterd (server-onafhankelijk)
          - Bot patronen herkenning (`@whatsapp`, `@botwhatsapp`, etc)
          - Phone number detectie voor WhatsApp chats
          
          **Let op:** Image resize voor foto uploads is tijdelijk uitgeschakeld i.v.m. crash op Android 17.
          
          **Build info:**
          - Build nummer: ${{ github.run_number }}
          - Commit: ${{ github.sha }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
