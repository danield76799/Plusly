name: Build Release APK with Local Keystore

on:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload unsigned APK
        uses: actions/upload-artifact@v4
        with:
          name: release-unsigned-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: unsigned-v${{ github.run_number }}
          name: Unsigned Release v${{ github.run_number }}
          body: |
            ## Unsigned Release
            This APK is NOT signed. You need to sign it manually with:
            ```
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
              -keystore your-keystore.jks \
              -storepass your-password \
              app-release.apk your-alias
            ```
          draft: true
          prerelease: false