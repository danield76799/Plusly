name: Generate Screenshots

on:
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate screenshots with integration tests
        run: |
          # Start emulator
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "system-images;android-33;google_apis;x86_64"
          echo "no" | $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager create avd -n test -k "system-images;android-33;google_apis;x86_64" --force
          $ANDROID_HOME/emulator/emulator -avd test -no-window -no-audio -gpu swiftshader_indirect &
          
          # Wait for emulator
          adb wait-for-device
          adb shell input keyevent 82
          
          # Run integration tests that generate screenshots
          flutter drive --driver=test_driver/screenshot_driver.dart --target=integration_test/screenshots.dart

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots
          path: screenshots/
          retention-days: 30

      - name: Upload to Google Play
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Screenshots generated and ready for Google Play upload"
          echo "Download them from the artifacts and upload manually to Play Console"