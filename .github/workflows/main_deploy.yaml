name: Main Deploy Workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main_deploy
  cancel-in-progress: true

jobs:
  build_android_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clone for faster checkout
          depth: 1        # Only fetch latest commit

      - run: cat .github/workflows/versions.env >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
          cache: 'gradle'  # Cache Gradle dependencies

      - name: Setup Flutter
        run: |
          git clone --depth 1 https://github.com/flutter/flutter.git -b stable
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-deps-${{ runner.os }}-

      - name: Verify Flutter
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter --version

      - name: Clean Flutter build
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter clean

      - name: Generate localization
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter gen-l10n

      - name: Generate assets
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter pub run flutter_launcher_icons:main
          flutter pub run flutter_native_splash:create

      - name: Build Android APK
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter build apk --release --target-platform android-arm64,android-arm 2>&1 | tee build.log
          BUILD_EXIT_CODE=$?
          echo "=== Build completed with exit code: $BUILD_EXIT_CODE ==="
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            tail -100 build.log
          fi
          exit $BUILD_EXIT_CODE

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-build-log
          path: build.log
          retention-days: 3

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.6
          name: Plusly v1.0.6 (Chat UI Improvements)
          body: |
            ## What's New in v1.0.6
            
            ### Chat UI Improvements
            - **Better padding**: 16px horizontal, 12px vertical for more comfortable typing
            - **Visual shadow**: Subtle shadow effect on input field for depth
            - **Rounded corners**: Smooth 24px border radius on input container
            - **Send button styling**: 
              - Color changes based on text presence (primary when active)
              - Larger touch target (48x48dp minimum)
              - Rounded corners with subtle elevation when active
            - **Border feedback**: Input border changes color when text is present
            
            ### Previous Features
            - Seen by filter (eigen avatar gefilterd)
            - "Read by" tekst (was "Read receipts")
            - Performance fixes
            - Enhanced presence handling
            - Unified Push notifications
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}