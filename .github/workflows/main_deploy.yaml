name: Main Deploy Workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main_deploy
  cancel-in-progress: true

jobs:
  build_android_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clone for faster checkout
          depth: 1        # Only fetch latest commit

      - run: cat .github/workflows/versions.env >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
          cache: 'gradle'  # Cache Gradle dependencies

      - name: Setup Flutter
        run: |
          git clone --depth 1 https://github.com/flutter/flutter.git -b stable
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-deps-${{ runner.os }}-

      - name: Verify Flutter
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter --version

      - name: Clean Flutter build
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter clean

      - name: Generate localization
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter gen-l10n

      - name: Generate assets
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter pub run flutter_launcher_icons:main
          flutter pub run flutter_native_splash:create

      - name: Build Android APK
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter build apk --release --target-platform android-arm64,android-arm
        continue-on-error: true

      - name: Check APK exists
        id: check_apk
        run: |
          if [ -f "build/app/outputs/flutter-apk/app-release.apk" ]; then
            echo "apk_exists=true" >> $GITHUB_OUTPUT
            echo "APK found!"
            ls -lh build/app/outputs/flutter-apk/app-release.apk
          else
            echo "apk_exists=false" >> $GITHUB_OUTPUT
            echo "APK NOT FOUND"
            ls -la build/app/outputs/flutter-apk/ || echo "Directory does not exist"
          fi

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-build-log
          path: build.log
          retention-days: 3

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        if: steps.check_apk.outputs.apk_exists == 'true'
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.check_apk.outputs.apk_exists == 'true'
        with:
          tag_name: v1.0.7
          name: Plusly v1.0.7 (Location Sharing)
          body: |
            ## What's New in v1.0.7
            
            ### Location Sharing
            - Share your location in chats
            - OpenStreetMap integration
            - "Open in Maps" button
            
            ### Previous Features
            - Chat UI Improvements
            - Seen by filter
            - "Read by" tekst
            - Performance fixes
            - Enhanced presence handling
            - Unified Push notifications
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}