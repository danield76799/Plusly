name: Main Deploy Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main_deploy
  cancel-in-progress: true

jobs:
  deploy_web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
      - name: Debug Flutter environment
        run: |
          flutter doctor -v
          flutter --version
          echo "GITHUB_REF: $GITHUB_REF"
          echo "GITHUB_SHA: $GITHUB_SHA"
      - run: flutter pub get
      - name: Generate launcher icons
        run: dart run flutter_launcher_icons
      - name: Generate native splash
        run: dart run flutter_native_splash:create
      - name: Prepare web
        run: ./scripts/prepare-web.sh
      - name: Build Release Web
        run: |
          echo "=== Starting Web Build ==="
          flutter build web --dart-define=FLUTTER_WEB_CANVASKIT_URL=canvaskit/ --release --source-maps --base-href "/extrachat/" --verbose 2>&1 | tee build.log
          echo "=== Build completed with exit code: $? ==="
          if [ -f build/web/index.html ]; then echo "SUCCESS: index.html found"; else echo "ERROR: index.html NOT found"; fi
      - run: mv build/web/ public
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          destination_dir: extrachat

  build_android_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: stable
          cache: true
      - name: Debug Flutter environment
        run: |
          flutter doctor -v
          flutter --version
          java -version
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "JAVA_HOME: $JAVA_HOME"
      - name: Clean Flutter build
        run: |
          flutter clean
          rm -rf build/
      - run: flutter pub get
      - name: Generate l10n
        run: flutter gen-l10n
      - name: Generate launcher icons
        run: dart run flutter_launcher_icons
      - name: Generate native splash
        run: dart run flutter_native_splash:create
      - name: Build Android APK
        run: |
          echo "=== Starting Android APK Build ==="
          flutter build apk --release --target-platform android-arm64 2>&1 | tee build.log
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Build completed with exit code: $BUILD_EXIT_CODE ==="
          ls -la build/app/outputs/apk/release/ 2>/dev/null || ls -la build/app/outputs/ 2>/dev/null || ls -la build/app/ 2>/dev/null || echo "No build/app directory found"
          find . -name "*.apk" 2>/dev/null || echo "No APK files found"
          if [ -f build/app/outputs/apk/release/app-release.apk ]; then
            echo "SUCCESS: APK found"
            ls -la build/app/outputs/apk/release/
          else
            echo "ERROR: APK NOT found"
            echo "=== Last 100 lines of build.log ==="
            tail -100 build.log
            echo "=== Full build.log contents ==="
            cat build.log
          fi
          if [ $BUILD_EXIT_CODE -ne 0 ]; then exit 1; fi
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: build.log
          retention-days: 30
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: extrachat-build-${{ github.run_number }}
          name: ExtraChat Build ${{ github.run_number }}
          body: |
            Automated APK build for ExtraChat
            - Run: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Package: com.danield.extrachat
          files: build/app/outputs/apk/release/app-release.apk
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
