name: Main Deploy Workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main_deploy
  cancel-in-progress: true

jobs:
  build_android_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
      - name: Setup Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1
          echo "$PWD/flutter/bin" >> $GITHUB_PATH
      - name: Verify Flutter
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter doctor -v
          flutter --version
      - name: Clean Flutter build
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter clean
      - name: Generate l10n
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter gen-l10n
      - name: Generate launcher icons
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter pub run flutter_launcher_icons:main
      - name: Generate native splash
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter pub run flutter_native_splash:create
      - name: Build Android APK
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter build apk --release --target-platform android-arm64,android-arm --verbose 2>&1 | tee build.log
          BUILD_EXIT_CODE=$?
          echo "=== Build completed with exit code: $BUILD_EXIT_CODE ==="
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            echo "=== Last 300 lines of build.log ==="
            tail -300 build.log
            echo "=== Full build.log contents ==="
            cat build.log
            echo "=== END OF LOGS ==="
          fi
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "SUCCESS: APK found at build/app/outputs/flutter-apk/app-release.apk"
            ls -la build/app/outputs/flutter-apk/
          else
            echo "ERROR: APK NOT found at expected location"
            exit 1
          fi
          exit $BUILD_EXIT_CODE
      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-build-log
          path: build.log
          retention-days: 7
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.6
          name: Plusly v1.0.6 (Chat UI Improvements)
          body: |
            ## What's New in v1.0.6
            
            ### Chat UI Improvements
            - **Better padding**: 16px horizontal, 12px vertical for more comfortable typing
            - **Visual shadow**: Subtle shadow effect on input field for depth
            - **Rounded corners**: Smooth 24px border radius on input container
            - **Send button styling**: 
              - Color changes based on text presence (primary when active)
              - Larger touch target (48x48dp minimum)
              - Rounded corners with subtle elevation when active
            - **Border feedback**: Input border changes color when text is present
            
            ### Previous Features
            - Seen by filter (eigen avatar gefilterd)
            - "Read by" tekst (was "Read receipts")
            - Performance fixes
            - Enhanced presence handling
            - Unified Push notifications
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}