name: Main Deploy Workflow

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main_deploy
  cancel-in-progress: true

jobs:
  build_android_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cat .github/workflows/versions.env >> $GITHUB_ENV
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
      - name: Setup Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1
          echo "$PWD/flutter/bin" >> $GITHUB_PATH
      - name: Verify Flutter
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter doctor -v
          flutter --version
          java -version
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_SDK_ROOT: $ANDROID_SDK_ROOT"
          echo "JAVA_HOME: $JAVA_HOME"
      - name: Clean Flutter build
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter clean
          rm -rf build/
      - run: export PATH="$PWD/flutter/bin:$PATH" && flutter pub get
      - name: Generate l10n
        run: export PATH="$PWD/flutter/bin:$PATH" && flutter gen-l10n
      - name: Generate launcher icons
        run: export PATH="$PWD/flutter/bin:$PATH" && dart run flutter_launcher_icons
      - name: Generate native splash
        run: export PATH="$PWD/flutter/bin:$PATH" && dart run flutter_native_splash:create
      - name: Build Android APK
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          echo "=== Starting Android APK Build ==="
          echo "Flutter version:"
          flutter --version
          echo "Dart version:"
          dart --version
          echo "=== Running flutter build apk ==="
          set -o pipefail
          flutter build apk --release --target-platform android-arm64,android-arm --verbose 2>&1 | tee build.log || true
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          echo "=== Build completed with exit code: $BUILD_EXIT_CODE ==="
          if [ $BUILD_EXIT_CODE -ne 0 ]; then 
            echo "=== BUILD FAILED ==="
            echo "=== Last 300 lines of build.log ==="
            tail -300 build.log
            echo "=== Full build.log contents ==="
            cat build.log
            echo "=== END OF LOGS ==="
            exit 1
          fi
          echo "=== Directory structure ==="
          ls -la build/ 2>/dev/null || echo "No build directory"
          ls -la build/app/ 2>/dev/null || echo "No build/app directory"
          ls -la build/app/outputs/ 2>/dev/null || echo "No build/app/outputs directory"
          ls -la build/app/outputs/flutter-apk/ 2>/dev/null || echo "No build/app/outputs/flutter-apk directory"
          ls -la build/app/outputs/apk/ 2>/dev/null || echo "No build/app/outputs/apk directory"
          echo "=== Searching for APK files ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "No APK files found"
          if [ -f build/app/outputs/flutter-apk/app-release.apk ]; then
            echo "SUCCESS: APK found at build/app/outputs/flutter-apk/app-release.apk"
            ls -la build/app/outputs/flutter-apk/
          else
            echo "ERROR: APK NOT found at expected location"
            exit 1
          fi
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-log
          path: build.log
          retention-days: 30
      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: plusly-build-${{ github.run_number }}
          name: Plusly Build ${{ github.run_number }}
          body: |
            Automated build for Plusly
            - Run: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            - Package: com.danield.plusly
          files: |
            build/app/outputs/flutter-apk/app-release.apk
          prerelease: true
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
