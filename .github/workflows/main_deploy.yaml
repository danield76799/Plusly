name: Main Deploy Workflow

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: main_deploy
  cancel-in-progress: true

jobs:
  build_android_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - run: cat .github/workflows/versions.env >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Flutter
        run: |
          git clone --depth 1 https://github.com/flutter/flutter.git -b stable
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-deps-${{ runner.os }}-

      - name: Verify Flutter
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter --version

      - name: Clean Flutter build
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter clean

      - name: Generate localization
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter gen-l10n

      - name: Generate assets
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter pub run flutter_launcher_icons:main
          flutter pub run flutter_native_splash:create

      - name: Build Android APK
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter build apk --release --target-platform android-arm64,android-arm --dart-define=DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }} 2>&1 | tee build.log
          BUILD_EXIT_CODE=$?
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "=== BUILD FAILED ==="
            echo "Looking for Dart/Flutter errors in log:"
            grep -E "(error:|Error:|FAILURE|Exception:)" build.log | head -50
            echo ""
            echo "Last 100 lines of build log:"
            tail -100 build.log
            exit $BUILD_EXIT_CODE
          fi
          # Copy APK to known location
          mkdir -p output
          cp build/app/outputs/flutter-apk/app-release.apk output/plusly-release.apk
          ls -la output/

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-build-log
          path: build.log
          retention-days: 3

      - name: Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: output/plusly-release.apk
          retention-days: 7

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.8
          name: Plusly v1.0.8
          files: output/plusly-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
