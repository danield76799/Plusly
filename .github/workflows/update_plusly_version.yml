name: Update Plusly Version

on:
  push:
    branches: [ main ]
    paths:
      - 'pubspec.yaml'
  workflow_dispatch:

jobs:
  update-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract version from pubspec.yaml
        id: get_version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //' | tr -d ' ')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"
      
      - name: Update plusly-version.txt
        run: |
          echo "${{ steps.get_version.outputs.VERSION }}" > plusly-version.txt
          echo "Updated plusly-version.txt to: ${{ steps.get_version.outputs.VERSION }}"
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add plusly-version.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update plusly-version.txt to ${{ steps.get_version.outputs.VERSION }}"
            git push
          fi
