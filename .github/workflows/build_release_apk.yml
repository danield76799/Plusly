name: Build Release APK for Google Play

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Create keystore directory
          mkdir -p android/app
          
          # Save base64 to file first (avoid issues with special characters)
          echo "$KEYSTORE_BASE64" > /tmp/keystore.b64
          
          # Check if secret is set
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "Error: KEYSTORE_BASE64 secret is not set or empty"
            exit 1
          fi
          
          # Decode base64 keystore
          base64 -d /tmp/keystore.b64 > android/app/keystore.jks
          
          # Check if keystore is valid
          if [ ! -s android/app/keystore.jks ]; then
            echo "Error: Keystore file is empty or not created"
            echo "Secret length: ${#KEYSTORE_BASE64} characters"
            exit 1
          fi
          
          echo "Keystore file size: $(wc -c < android/app/keystore.jks) bytes"
          
          # Sign APK
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore android/app/keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            build/app/outputs/flutter-apk/app-release.apk "$KEY_ALIAS"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Changes in this release
            - Automated release build
            - See commit history for details
          draft: true
          prerelease: false