name: Build Release APK for Google Play

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Sign APK
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # Create keystore directory
          mkdir -p android/app
          
          # Decode base64 keystore using Python (more reliable)
          python3 -c "
import base64
import sys
keystore_b64 = '${{ secrets.KEYSTORE_BASE64 }}'
# Remove any whitespace/newlines
keystore_b64 = ''.join(keystore_b64.split())
with open('android/app/keystore.jks', 'wb') as f:
    f.write(base64.b64decode(keystore_b64))
print('Keystore created successfully')
"
          
          # Check if keystore is valid
          if [ ! -s android/app/keystore.jks ]; then
            echo "Error: Keystore file is empty or not created"
            exit 1
          fi
          
          echo "Keystore file size: $(wc -c < android/app/keystore.jks) bytes"
          
          # Sign APK
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore android/app/keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            build/app/outputs/flutter-apk/app-release.apk "$KEY_ALIAS"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: build/app/outputs/flutter-apk/app-release.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Changes in this release
            - Automated release build
            - See commit history for details
          draft: true
          prerelease: false