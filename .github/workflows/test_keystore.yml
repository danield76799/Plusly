name: Test Keystore Secret

on:
  workflow_dispatch:

jobs:
  test-keystore:
    runs-on: ubuntu-latest
    steps:
      - name: Check if keystore secret exists
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "ERROR: KEYSTORE_BASE64 secret is NOT set!"
            echo "Please add the secret at:"
            echo "https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi
          
          echo "SUCCESS: KEYSTORE_BASE64 secret is set"
          echo "Length: ${#KEYSTORE_BASE64} characters"
          
          # Try to decode
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/test_keystore.jks
          
          if [ -s /tmp/test_keystore.jks ]; then
            echo "SUCCESS: Keystore decoded successfully"
            echo "File size: $(wc -c < /tmp/test_keystore.jks) bytes"
          else
            echo "ERROR: Keystore decoding failed - file is empty"
            exit 1
          fi