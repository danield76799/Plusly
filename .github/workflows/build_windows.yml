name: Build Windows Desktop

on:
  push:
    branches: [ main, master, dev ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.41.9'
        channel: 'stable'
        
    - name: Enable Windows Desktop
      run: flutter config --enable-windows-desktop
      
    - name: Get dependencies
      run: flutter pub get
      
    - name: Fix CMake for Firebase
      run: |
        $cmakeFile = "build/windows/x64/extracted/firebase_cpp_sdk_windows/CMakeLists.txt"
        if (Test-Path $cmakeFile) {
          $content = Get-Content $cmakeFile -Raw
          $content = $content -replace 'cmake_minimum_required\\(VERSION 3.1\\)', 'cmake_minimum_required(VERSION 3.5)'
          $content | Set-Content $cmakeFile
          Write-Host "Fixed CMake version in Firebase SDK"
        }
      
    - name: Build Windows
      run: flutter build windows --release
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: plusly-windows
        path: build/windows/x64/runner/Release/