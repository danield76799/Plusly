name: Deploy Existing Build to Play Store

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to build from'
        required: true
        default: '4955186315f8b0154e5d39a6294536bff99778f6'
      version_code:
        description: 'Version code for Play Store'
        required: true
        default: '805'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout specific commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.commit_sha }}
          fetch-depth: 1

      - run: cat .github/workflows/versions.env >> $GITHUB_ENV

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'zulu'
          cache: 'gradle'

      - name: Setup Flutter
        run: |
          git clone --depth 1 https://github.com/flutter/flutter.git -b stable
          echo "$PWD/flutter/bin" >> $GITHUB_PATH

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ~/.gradle/caches
          key: flutter-deps-${{ runner.os }}-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            flutter-deps-${{ runner.os }}-

      - name: Verify Flutter
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter --version

      - name: Clean Flutter build
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter clean

      - name: Generate localization
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter gen-l10n

      - name: Generate assets
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter pub run flutter_launcher_icons:main
          flutter pub run flutter_native_splash:create

      - name: Setup Play Store signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          PLAYSTORE_DEPLOY_KEY: ${{ secrets.PLAYSTORE_DEPLOY_KEY }}
        run: |
          cd android
          echo "$KEYSTORE_BASE64" | base64 -d > upload-keystore.jks
          cat > key.properties << EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF
          echo "$PLAYSTORE_DEPLOY_KEY" > keys.json
          cd ..

      - name: Update version code
        run: |
          VERSION_CODE=${{ github.event.inputs.version_code }}
          sed -i "s/^version: .*/version: 1.1.0+$VERSION_CODE/" pubspec.yaml
          cat pubspec.yaml | grep "^version:"

      - name: Build Android App Bundle
        env:
          DEEPL_API_KEY: ${{ secrets.DEEPL_API_KEY }}
        run: |
          export PATH="$PWD/flutter/bin:$PATH"
          flutter build appbundle \
            --release \
            --target-platform android-arm,android-arm64,android-x64 \
            --dart-define=DEEPL_API_KEY=${{ secrets.DEEPL_API_KEY }}

      - name: Setup Ruby & Fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
        working-directory: android

      - name: Install bundle dependencies
        working-directory: android
        run: |
          gem install bundler:2.5.22
          bundle install

      - name: Deploy to Play Store
        working-directory: android
        run: bundle exec fastlane deploy_internal_test

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: plusly-aab-playstore
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 7
