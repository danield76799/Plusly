name: Build Android APK (Debug + Release)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Debug APK (64-bit)
        run: flutter build apk --debug --target-platform android-arm64

      - name: Build Debug APK (32-bit)
        run: flutter build apk --debug --target-platform android-arm

      - name: Build Release APK (64-bit)
        run: flutter build apk --release --target-platform android-arm64

      - name: Build Release APK (32-bit)
        run: flutter build apk --release --target-platform android-arm

      - name: Upload Debug APK (64-bit)
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-64bit
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Debug APK (32-bit)
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk-32bit
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload Release APK (64-bit)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-64bit
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Upload Release APK (32-bit)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-32bit
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/flutter-apk/app-release.apk
          tag_name: v0.9.9-build${{ github.run_number }}
          name: Plusly v0.9.9 (Build #${{ github.run_number }})
          body: |
            ## Plusly v0.9.9

            **Build info:**
            - Build nummer: ${{ github.run_number }}
            - Commit: ${{ github.sha }}
            
            **APKs:**
            - `app-debug.apk` - Debug versie (voor troubleshooting)
            - `app-release.apk` - Release versie
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}